services:
  rag-md-watcher:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "${IMAGE_TAG:-1.0.1}"
        SOURCE_REPOSITORY: "${SOURCE_REPOSITORY:-https://github.com/kewinall/rag-md-folder-watcher}"
    image: "${IMAGE_NAME:-ghcr.io/kewinall/rag-md-folder-watcher}:${IMAGE_TAG:-1.0.1}"
    container_name: rag-md-folder-watcher
    restart: unless-stopped
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"

    environment:
      DATA_ROOT: /data
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-3}"
      STABLE_CHECKS: "${STABLE_CHECKS:-3}"
      WATCH_RECURSIVE: "${WATCH_RECURSIVE:-true}"
      PROCESS_EXISTING_ON_START: "${PROCESS_EXISTING_ON_START:-true}"

      OCR_ENABLED: "${OCR_ENABLED:-true}"
      OCR_LANG: "${OCR_LANG:-eng+chi_tra}"
      OCR_TIMEOUT_SEC: "${OCR_TIMEOUT_SEC:-120}"
      PDF_OCR_DPI: "${PDF_OCR_DPI:-200}"
      PDF_OCR_MAX_PAGES: "${PDF_OCR_MAX_PAGES:-100}"
      ENABLE_LIBREOFFICE: "${ENABLE_LIBREOFFICE:-true}"
      LIBREOFFICE_TIMEOUT_SEC: "${LIBREOFFICE_TIMEOUT_SEC:-180}"

      MAX_FILE_MB: "${MAX_FILE_MB:-100}"
      MAX_OUTPUT_CHARS: "${MAX_OUTPUT_CHARS:-2000000}"
      EXCEL_MAX_ROWS_PER_SHEET: "${EXCEL_MAX_ROWS_PER_SHEET:-5000}"
      CSV_MAX_ROWS: "${CSV_MAX_ROWS:-10000}"
      REMOVE_REPEATED_LINES: "${REMOVE_REPEATED_LINES:-true}"

      ARCHIVE_SOURCE: "${ARCHIVE_SOURCE:-true}"
      WRITE_METADATA: "${WRITE_METADATA:-true}"
      WRITE_DONE_MARKER: "${WRITE_DONE_MARKER:-true}"
      DEDUPLICATE: "${DEDUPLICATE:-false}"
      OVERWRITE_OUTPUT: "${OVERWRITE_OUTPUT:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      HEALTHCHECK_MAX_AGE_SECONDS: "${HEALTHCHECK_MAX_AGE_SECONDS:-60}"

    volumes:
      - "${HOST_DATA_DIR:-./data}:/data"

    read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
      - /var/tmp:size=512m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: "${MEM_LIMIT:-4g}"
    cpus: "${CPU_LIMIT:-2.0}"

    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
