name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libreoffice-writer libreoffice-calc libreoffice-impress \
            tesseract-ocr tesseract-ocr-eng tesseract-ocr-chi-tra \
            fonts-noto-cjk
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-dev.txt

      - name: Run release tests
        run: python -m pytest -q

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=RAG Markdown Folder Watcher
            org.opencontainers.image.description=Folder watcher that converts documents into RAG-ready Markdown
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
            SOURCE_REPOSITORY=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ROOT="rag-md-folder-watcher-${VERSION}"
          mkdir -p "dist/${ROOT}"
          rsync -a ./ "dist/${ROOT}/" \
            --exclude .git \
            --exclude dist \
            --exclude .env \
            --exclude data \
            --exclude .venv \
            --exclude __pycache__ \
            --exclude .pytest_cache
          (cd dist && zip -qr "${ROOT}.zip" "${ROOT}")
          (cd dist && sha256sum "${ROOT}.zip" > "${ROOT}.zip.sha256")

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="dist/rag-md-folder-watcher-${VERSION}.zip"
          SHA="${ZIP}.sha256"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ZIP" "$SHA" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ZIP" "$SHA" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
